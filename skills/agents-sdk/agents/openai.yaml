interface:
  display_name: "Agents SDK"
  short_description: "Build stateful Cloudflare agents"
  default_prompt: "Use $agents-sdk to build or review a Cloudflare Agents SDK application."

dependencies:
  tools:
    - type: "mcp"
      value: "cloudflare-api"
      description: "Cloudflare API Code Mode MCP server for Workers and Agents resources"
      transport: "streamable_http"
      url: "https://mcp.cloudflare.com/mcp"
